<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help</title>

    <style>
        body {
            background-color: #f2efe7;
            margin: 0;
            padding-top: 80px;

            background-image: url("help.png");
            background-repeat: no-repeat;
            background-size: 600px;
            background-position: right;
            min-height: 100vh;
            padding: 50px;
        }
        .highlight {
    background-color: #8b0000;
    color: #f2efe7;
    padding: 5px 10px;
    border-radius: 4px;
}
        h1 {
    font-size: 60px;
    font-family: "Georgia", "Times New Roman", serif;
    letter-spacing: 2px;
    font-weight: 400;
    text-transform: uppercase;
}
        .text {
    width: 40%;
    max-width: 500px;
}
        p {
    font-size: 20px;
    line-height: 1.8;
    font-family: "Georgia", serif;
    color: #333;
}
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;

    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap:wrap;

    padding: 20px 10px;
    background-color: #8b0000;
    backdrop-filter: blur(6px);

    z-index: 1000;
}

.logo {
    font-family: "Playfair Display", serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: bisque;
}

.nav-links {
    display: flex;
    gap: 20px;
    margin-right: 30px;
}

.nav-links a {
    text-decoration: none;
    color: bisque;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
}

.nav-links a:hover {
    color: black;
}
.organisations{
    display: flex;
    gap: 40px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.org-card {
    display: block;
    width: 250px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.3s ease;
}

.org-card img {
    width: 100%;
    border: 3px solid #8b0000;
    border-radius: 8px;
    transition: transform 0.3s ease;
}

.org-card:hover img {
    transform: scale(1.08);
}

.org-text {
    font-size: 14px;
    margin-top: 10px;
    text-align: center;
    font-family: Georgia, serif;
    color: #333;
}
    </style>
</head>

<body>
<h1 class="text">How To<span class="highlight">Help?</span></h1>
<p>Below are two Sudanese organizations supporting<br>
women by providing sanitary pads. You can click the<br>
links to learn more or make a donation.</p>
<div class="organisations">

    <a href="https://www.facebook.com/Padneededdignityseeded/" target="_blank" class="org-card">
        <img src="one.jpeg" alt="A Pad to fill the gap">
        <p class="org-text"><strong>A Pad to Fill the Gap</strong></p>
    </a>

    <a href="https://www.facebook.com/redcardorganization/" target="_blank" class="org-card">
        <img src="two.jpeg" alt="RedCard">
        <p class="org-text"><strong>RedCard Organisation</strong></p>
    </a>

</div>
<nav class="navbar">
<a href="https://www.instagram.com/noshamesud/" target="_blank" class="logo">
    No Shame</a>
    <div class="nav-links">
        <a href="index.html">Story of Ameera</a>
        <a href="Register.html">Register</a>
    </div>
</nav>
</body>
</html>
